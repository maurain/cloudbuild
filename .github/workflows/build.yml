name: build

on:
  # push:
  #   branches:
  #     - main
  #   paths-ignore:
  #     - 'web-ui/**' # 忽略 web-ui 目录下的所有文件改动
  workflow_dispatch:

# 优化点 1：并发控制。避免同一分支的多次 Push 重复运行，自动取消旧的构建以节省 macos 额度
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26 # 保持您指定的 macOS 环境

    steps:
      # 修改点：拉取指定的私有仓库
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'nextie-ai/tuanziclient'
          token: ${{ secrets.GH_PAT }} # 使用您在 Secret 中配置的 PAT（需要有该私有仓库的拉取权限）

      # 优化点 2：确保 Xcode 26.3 为内置版本
      #（提示：setup-xcode 如果检测到版本未预装，会从 Apple 开发者网站下载，这可能消耗 15~30 分钟）
      # 如果 26.3 已经是 macos-26 的默认 Xcode 版本，可以安全地移除此 Step 以节省时间
      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # 优化点 3：缓存 CocoaPods 依赖。
      # 本地打包 iOS 时，CocoaPods 下载和 Spec 检索非常耗时。
      # 由于托管工作流的 ios 目录是动态生成的，此处我们以 package-lock.json 的 hash 作为缓存的 Key
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # 优化点 4：使用 --prefer-offline 和 --no-audit 加速依赖安装，减少不必要的网络请求
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit > /dev/null

      # 优化点 5：启用 expo-github-action 内置的 EAS 缓存
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      - name: Build iOS App Locally
        run: |
          eas build --platform ios --profile production --local --non-interactive --output=app.ipa > /dev/null

      - name: Submit to TestFlight
        run: |
          eas submit --platform ios --profile production --path=app.ipa --non-interactive > /dev/null
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
