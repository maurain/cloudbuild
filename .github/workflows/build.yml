name: build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'nextie-ai/tuanziclient'
          token: ${{ secrets.GH_PAT }}

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      - name: Build iOS App Locally
        run: |
          eas build --platform ios --profile testflight --local --non-interactive --output=app.ipa

      - name: Submit to TestFlight
        run: |
          eas submit --platform ios --profile testflight --path=app.ipa --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
